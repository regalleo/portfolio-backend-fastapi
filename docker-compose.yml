version: '3.8'

services:
  portfolio-backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-hello@rajshekhar.live}
      - CORS_ORIGIN=https://raj-shekhar-portfolio.netlify.app
    volumes:
      - ./portfolio.db:/app/portfolio.db

volumes: {}

